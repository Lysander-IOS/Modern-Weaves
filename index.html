            { id: 86, category: 'Baby Clothing', name: 'Baby Cow Outfit', price: 459, image: 'https://i.pinimg.com/736x/44/4d/ef/444def580dd943e1e964f7f5e5d98103.jpg', desc: 'Handmade crochet baby cow outfit features a hat with horns and a matching romper.' },
            { id: 87, category: 'Baby Clothing', name: 'Crochet Baby Bibs', price: 149, image: 'https://i.pinimg.com/736x/a0/3a/3c/a03a3c1607ae2e5b204700be3563c7b3.jpg', desc: 'Designed in a charming animal-face theme with floral details. ' },
            { id: 88, category: 'Baby Clothing', name: 'Hat & Booties Set', price: 349, image: 'https://i.pinimg.com/1200x/45/74/61/457461fde7a43064918dfb5c65f24e9c.jpg', desc: 'A0 labor of love crafted with care for a precious new arrival.' },
            { id: 89, category: 'Baby Clothing', name: 'Hat & Booties & Gloves Set', price: 419, image: 'https://i.pinimg.com/736x/47/c7/a1/47c7a1af7167a151452afbc9115bad44.jpg', desc: 'Crafted with soft plush yarn, Bernat Baby Blanket yarn' },
            { id: 90, category: 'Baby Clothing', name: 'Moon & Stars Pancho', price: 519, image: 'https://i.pinimg.com/736x/6d/63/b8/6d63b8537a57e1e5ce8c2a4d3b393d80.jpg', desc: 'This magical "Moon and Stars" poncho is designed to keep your little one cozy, stylish, and snug as a bug on all their adventures' },
            { id: 91, category: 'Baby Clothing', name: 'Crochet Booties & Fluffy Buddy', price: 549, image: 'https://i.pinimg.com/736x/a1/ef/05/a1ef05b3bf9d1c24f3e8e3d0050226d3.jpg', desc: 'Handmade plush teddy bear and matching baby booties crochet set, crafted from soft chenille yarn.' },
            { id: 92, category: 'Baby Clothing', name: 'Duckie Blanket', price: 299, image: 'https://i.pinimg.com/1200x/19/36/2b/19362b629a2a5c1ce1fc18f2be079e7f.jpg', desc: ' Blue crochet baby blanket featuring yellow duck appliques and a white border.' },
            { id: 93, category: 'Baby Clothing', name: 'Bear Blanket', price: 349, image: 'https://i.pinimg.com/736x/a3/24/f0/a324f02257ad89e2ff6cf2a982fdfd17.jpg', desc: 'Wrap your little one in warmth and whimsy with this adorable, handmade crochet baby blanket featuring a charming little teddy bear accent.' },
            { id: 94, category: 'Baby Clothing', name: 'Gingham Blanket', price: 399, image: 'https://i.pinimg.com/1200x/d4/8c/c1/d48cc16cbc2a1abcac066b56ba4675d8.jpg', desc: 'Handmade gingham-style baby blanket constructed from crocheted granny squares in shades of blue and white.' },
            { id: 95, category: 'Baby Clothing', name: 'Winnie The Pooh Blanket', price: 349, image: 'https://i.pinimg.com/1200x/80/64/10/806410bb454955655e817b1f59463e33.jpg', desc: 'Wrap your little one in comfort and nostalgia with this adorable, handcrafted Winnie the Pooh crochet baby blanket, perfect for snuggles and sweet dreams.' },
            { id: 96, category: 'Baby Clothing', name: 'Baby Blanket & Cute Beanie', price: 399, image: 'https://i.pinimg.com/1200x/ef/eb/59/efeb5903077f6ce7f3b7db16def16d6c.jpg', desc: 'Wrap your little one in comfort with this adorable, handmade crocheted baby blanket and matching bear hat set, crafted with love to become a cherished favorite.' },
            { id: 97, category: 'Baby Clothing', name: 'Eeyore Blanket', price: 259, image: 'https://i.pinimg.com/736x/cb/37/56/cb37569d5824e1098bfd925d98eca098.jpg', desc: 'This handmade crochet blanket features a colorful portrait of Eeyore from Winnie the Pooh, created using graphgan color-work techniques.' },
            { id: 98, category: 'Baby Clothing', name: 'Bear Blanket', price: 349, image: 'https://i.pinimg.com/736x/e2/3c/c0/e23cc06d3a668a593887ed47a121cccc.jpg', desc: '"Sleep Tight, Little Bear" crochet pattern, made with cotton yarn and featuring a teddy bear motif on granny squares.' },
            { id: 99, category: 'Baby Clothing', name: 'Giraffe Blanket', price: 329, image: 'https://i.pinimg.com/1200x/63/d5/24/63d52408cec7fb40c84ea8af7afe604b.jpg', desc: 'Handcrafted crochet giraffe blanket, perfect for snuggles and nursery decor.' },

            // --- BOUQUETS (3) ---
            { id: 100, category: 'Bouquets', name: 'Hooked Tulip Bouqet', price: 699, image: 'https://i.pinimg.com/1200x/2c/39/61/2c39616b8a39ff0a1d8dc53c03348885.jpg', desc: 'This stunning, handcrafted crochet bouquet of lilies and roses offers everlasting beauty, a perfect and unique gift that will never wilt or fade.' },
            { id: 101, category: 'Bouquets', name: 'Sunflower Fuzzy Wire Bouquet', price: 599, image: 'https://i.pinimg.com/736x/98/85/00/988500c007141e95f2c3bd3a64ac1df5.jpg', desc: 'Handmade crochet flower bouquet containing sunflowers and daisies.' },
            { id: 102, category: 'Bouquets', name: 'Winter Frost Bouqet', price: 649, image: 'https://i.pinimg.com/736x/ce/4d/86/ce4d86fb71d86d0dcd681433792c5af4.jpg', desc: 'The arrangement includes blue and white flowers wrapped in rustic brown paper with a decorative bow.' }
        ];

        // --- MAIN APPLICATION COMPONENT ---
        const App = () => {
            const [page, setPage] = useState('home');
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [filter, setFilter] = useState('All');
            const [payMethod, setPayMethod] = useState('cod');
            const [reserveStudio, setReserveStudio] = useState(null);

            useEffect(() => { lucide.createIcons(); window.scrollTo(0,0); }, [page, isCartOpen, selectedProduct, payMethod, reserveStudio]);

            const addToCart = (p) => {
                setCart([...cart, { ...p, cartId: Math.random() }]);
                setIsCartOpen(true);
            };

            const totalPrice = cart.reduce((acc, curr) => acc + curr.price, 0);

            return (
                <div className="min-h-screen relative">
                    {/* NAVBAR (Strictly Centered Logo) */}
                    <nav className="fixed top-0 w-full z-50 bg-warm-fog/90 backdrop-blur-md border-b border-soldier/5 px-10 py-10">
                        <div className="max-w-7xl mx-auto flex items-center relative">
                            {/* Left Nav */}
                            <div className="flex gap-10 text-[16px] tracking-[0.2em] font-bold uppercase">
                                <button onClick={() => setPage('shop')} className="hover:text-blossom transition">Shop</button>
                                <button onClick={() => setPage('courses')} className="hover:text-blossom transition">Workshops</button>
                            </div>

                            {/* Centered Logo */}
                            <h1 onClick={() => setPage('home')} className="serif text-4xl tracking-[0.3em] font-bold cursor-pointer absolute left-1/2 -translate-x-1/2 whitespace-nowrap">MODERN WEAVES</h1>

                            {/* Right Nav */}
                            <div className="ml-auto flex gap-10 items-center text-[16px] tracking-[0.2em] font-bold uppercase">
                                <button onClick={() => setPage('about')} className="hover:text-blossom transition">About</button>
                                <button onClick={() => setIsCartOpen(true)} className="relative hover:scale-110 transition">
                                    <i data-lucide="shopping-bag" className="w-7 h-7"></i>
                                    {cart.length > 0 && (
                                        <span className="absolute -top-2 -right-2 bg-blossom text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-warm-fog font-bold">{cart.length}</span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* CART DRAWER */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[100] flex justify-end">
                            <div className="absolute inset-0 bg-soldier/20 backdrop-blur-sm" onClick={() => setIsCartOpen(false)} />
                            <div className="relative w-full max-w-md bg-warm-fog h-full p-10 shadow-2xl flex flex-col drawer-slide">
                                <div className="flex justify-between items-center mb-12">
                                    <h2 className="serif text-4xl">Your Cart</h2>
                                    <button onClick={() => setIsCartOpen(false)}><i data-lucide="x" className="w-8 h-8"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-8 no-scrollbar pr-2">
                                    {cart.length === 0 ? <p className="text-center italic opacity-40 py-20">Your bag is empty...</p> : 
                                        cart.map(item => (
                                            <div key={item.cartId} className="flex gap-5 bg-white/40 p-5 rounded-3xl border border-soldier/5 items-center">
                                                <img src={item.image} className="w-20 h-24 object-cover rounded-2xl shadow-sm" />
                                                <div className="flex-1">
                                                    <h4 className="serif text-xl leading-tight">{item.name}</h4>
                                                    <p className="text-sm font-bold text-blossom mt-1">{item.price} MAD</p>
                                                </div>
                                                <button onClick={() => setCart(cart.filter(c => c.cartId !== item.cartId))}><i data-lucide="trash-2" className="w-5 h-5 text-soldier/20 hover:text-blossom transition"></i></button>
                                            </div>
                                        ))
                                    }
                                </div>
                                {cart.length > 0 && (
                                    <div className="pt-8 border-t border-soldier/10">
                                        <div className="flex justify-between text-3xl serif mb-8"><span>Subtotal</span><span>{totalPrice} MAD</span></div>
                                        <button onClick={() => {setPage('checkout'); setIsCartOpen(false)}} className="w-full bg-soldier text-warm-fog py-6 rounded-full font-bold tracking-widest shadow-xl uppercase text-[12px]">Proceed to Checkout</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* RESERVE MODAL */}
                    {reserveStudio && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-soldier/60 backdrop-blur-md" onClick={() => setReserveStudio(null)} />
                            <div className="relative bg-warm-fog w-full max-w-lg p-12 rounded-[4rem] shadow-2xl fade-up">
                                <h3 className="serif text-4xl mb-2">Reserve a Spot</h3>
                                <p className="text-blossom font-bold uppercase tracking-widest text-xs mb-8">Studio: {reserveStudio}</p>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Full Name" className="w-full p-5 rounded-2xl bg-white outline-none border border-soldier/5" />
                                    <input type="email" placeholder="Email Address" className="w-full p-5 rounded-2xl bg-white outline-none border border-soldier/5" />
                                    <button onClick={() => {alert('Reservation sent! Marwa will get back to you soon.'); setReserveStudio(null)}} className="w-full bg-soldier text-warm-fog py-5 rounded-full font-bold mt-4 uppercase tracking-widest text-[11px]">Confirm Booking</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* WELCOME PAGE */}
                    {page === 'home' && (
                        <div className="fade-up">
                            <section className="welcome-hero h-screen flex flex-col items-center justify-center text-center px-6">
                                <div className="max-w-5xl">
                                    <p className="uppercase tracking-[0.6em] text-[13px] font-bold opacity-60 mb-10">Founded By Marwa Fathi</p>
                                    <h2 className="serif text-[7rem] md:text-[10rem] leading-none mb-12">Woven by <br/><span className="italic text-blossom font-light">Soul.</span></h2>
                                    <button onClick={() => setPage('shop')} className="bg-soldier text-warm-fog px-16 py-6 rounded-full font-bold tracking-[0.3em] text-[11px] shadow-2xl hover:bg-meadow transition-all uppercase">Explore Collection</button>
                                </div>
                            </section>
                        </div>
                    )}

                    {/* SHOP PAGE */}
                    {page === 'shop' && (
                        <div className="fade-up pt-52 px-10 pb-32">
                            <div className="max-w-7xl mx-auto">
                                <h2 className="serif text-8xl text-soldier mb-12">The Catalog</h2>
                                <div className="flex flex-wrap gap-3 mb-20">
                                    {['All', 'Toys', 'Accessories', 'Scarves', 'Cardigans', 'Sweaters', 'Dresses', 'Hats', 'Baby Clothing', 'Bouquets'].map(cat => (
                                        <button key={cat} onClick={() => setFilter(cat)} className={`px-8 py-4 rounded-full border border-soldier/10 text-[11px] font-bold uppercase tracking-widest transition-all ${filter === cat ? 'bg-soldier text-warm-fog shadow-lg' : 'bg-white/40 hover:bg-berry-good'}`}>{cat}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
                                    {PRODUCTS.filter(p => filter === 'All' || p.category === filter).map(p => (
                                        <div key={p.id} className="group cursor-pointer" onClick={() => {setSelectedProduct(p); setPage('detail')}}>
                                            <div className="aspect-[3/4] rounded-[3.5rem] overflow-hidden bg-white mb-8 shadow-sm group-hover:shadow-2xl transition-all relative">
                                                <img src={p.image} className="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 group-hover:scale-110 transition-all duration-1000" />

                                                    <span className="text-[10px] text-white uppercase font-bold tracking-widest bg-soldier/80 px-6 py-3 rounded-full">Quick View</span>
                                                </div>
                                            </div>
                                            <h4 className="serif text-3xl mb-1 text-soldier">{p.name}</h4>
                                            <div className="flex justify-between items-center opacity-60 font-bold text-[11px] uppercase tracking-widest">
                                                <span>{p.category}</span>
                                                <span className="text-blossom">{p.price} MAD</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DETAIL PAGE */}
                    {page === 'detail' && selectedProduct && (
                        <div className="fade-up pt-52 px-10 pb-32 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-24 items-center">
                            <div className="rounded-[5rem] overflow-hidden shadow-2xl border-[20px] border-white aspect-[4/5]">
                                <img src={selectedProduct.image} className="w-full h-full object-cover" />
                            </div>
                            <div>
                                <button onClick={() => setPage('shop')} className="mb-12 text-[12px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition flex items-center gap-2"><i data-lucide="arrow-left" className="w-4 h-4"></i> Back to shop</button>
                                <h1 className="serif text-7xl mb-8 leading-tight">{selectedProduct.name}</h1>
                                <p className="text-blossom text-5xl mb-12 font-light italic">{selectedProduct.price} MAD</p>
                                <p className="text-2xl leading-relaxed opacity-70 mb-14 italic max-w-xl">"{selectedProduct.desc}"</p>
                                <button onClick={() => addToCart(selectedProduct)} className="w-full bg-soldier text-warm-fog py-7 rounded-full font-bold shadow-2xl tracking-[0.2em] hover:bg-meadow transition-all uppercase text-[12px]">Add to Bag</button>
                            </div>
                        </div>
                    )}

                    {/* CHECKOUT PAGE */}
                    {page === 'checkout' && (
                        <div className="fade-up pt-52 px-10 pb-32 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-24">
                            <div className="space-y-16">
                                <h2 className="serif text-7xl">Checkout</h2>
                                <div className="space-y-6">
                                    <p className="text-[12px] font-bold uppercase tracking-widest opacity-40 uppercase">1. Delivery Address</p>
                                    <input type="text" placeholder="Full Name" className="w-full p-6 rounded-3xl bg-white border-none shadow-sm" />
                                    <input type="text" placeholder="Shipping Address" className="w-full p-6 rounded-3xl bg-white border-none shadow-sm" />
                                    <input type="text" placeholder="Phone Number" className="w-full p-6 rounded-3xl bg-white border-none shadow-sm" />
                                </div>
                                <div className="space-y-10">
                                    <p className="text-[12px] font-bold uppercase tracking-widest opacity-40 uppercase">2. Payment Method</p>
                                    <div className="flex gap-4">
                                        <button onClick={() => setPayMethod('cod')} className={`flex-1 py-6 rounded-3xl font-bold border-2 transition-all ${payMethod === 'cod' ? 'border-soldier bg-soldier text-warm-fog shadow-lg' : 'border-soldier/10 opacity-50 bg-white/40'}`}>Cash on Delivery</button>
                                        <button onClick={() => setPayMethod('card')} className={`flex-1 py-6 rounded-3xl font-bold border-2 transition-all ${payMethod === 'card' ? 'border-soldier bg-soldier text-warm-fog shadow-lg' : 'border-soldier/10 opacity-50 bg-white/40'}`}>Online Payment</button>
                                    </div>
                                    {payMethod === 'card' && (
                                        <div className="p-10 bg-white/60 rounded-[3rem] border border-white space-y-5 shadow-inner fade-up">
                                            <input type="text" placeholder="Cardholder Name" className="w-full p-5 rounded-2xl bg-white/80" />
                                            <input type="text" placeholder="Card Number (0000 0000 0000 0000)" className="w-full p-5 rounded-2xl bg-white/80" />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="text" placeholder="MM/YY" className="p-5 rounded-2xl bg-white/80" />
                                                <input type="text" placeholder="CVV" className="p-5 rounded-2xl bg-white/80" />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="bg-white/40 p-16 rounded-[5rem] border border-white h-fit shadow-2xl sticky top-52">
                                <h3 className="serif text-5xl mb-12">Summary</h3>
                                <div className="space-y-5 mb-12 max-h-[350px] overflow-y-auto no-scrollbar pr-4 italic opacity-70">
                                    {cart.map(i => <div key={i.cartId} className="flex justify-between text-lg"><span>{i.name}</span><span>{i.price} MAD</span></div>)}
                                </div>
                                <div className="border-t-2 border-soldier/10 pt-10 flex justify-between serif text-6xl">
                                    <span>Total</span>
                                    <span>{totalPrice} MAD</span>
                                </div>
                                <button onClick={() => alert('Order confirmed! We will contact you shortly.')} className="w-full bg-soldier text-warm-fog py-7 rounded-full font-bold mt-12 tracking-[0.3em] shadow-2xl uppercase text-[12px]">Complete Order</button>
                            </div>
                        </div>
                    )}

                    {/* ABOUT PAGE */}
                    {page === 'about' && (
                        <div className="fade-up pt-52 px-10 pb-32 max-w-4xl mx-auto text-center">
                            <p className="text-blossom font-bold tracking-[0.4em] uppercase text-xs mb-4">The Maker</p>
                            <h2 className="serif text-7xl mb-12 italic">Marwa Fathi</h2>
                            <div className="space-y-8 text-xl leading-relaxed italic opacity-80 mb-20">
                                <p>"Crochet is slow by nature. It's meant to be. I started Modern Weaves because I missed seeing things that were actually made by a person, not a factory line."</p>
                                <p>"I learned how to hold the hook from the women in my family in Casablanca. To me, every sweater or toy is a little piece of that memory. We use local Atlas wool, we sit together, we talk, and we weave."</p>
                                <p>"Thanks for choosing something that takes time. It really means a lot."</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[{c:'Casablanca', a:'Maarif Studio'}, {c:'Rabat', a:'Agdal District'}, {c:'Ifrane', a:'Winter Boutique'}].map(s => (
                                    <div key={s.c} className="p-10 bg-white/30 rounded-[3rem] border border-white">
                                        <h4 className="serif text-3xl mb-2">{s.c}</h4>
                                        <p className="text-[10px] font-bold uppercase opacity-40 tracking-widest">{s.a}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* COURSES PAGE */}
                    {page === 'courses' && (
                        <div className="fade-up pt-52 px-10 pb-32 max-w-5xl mx-auto">
                            <h2 className="serif text-7xl text-center mb-10 leading-tight">Studio Workshops</h2>
                            <p className="text-center opacity-60 text-lg mb-24 italic">Come sit with us. We host small, weekend sessions where we share the craft over tea.</p>
                            <div className="space-y-12">
                                {['Maarif Studio', 'Agdal Studio', 'Winter Boutique'].map(studio => (
                                    <div key={studio} className="bg-white/40 p-16 rounded-[5rem] flex flex-col md:flex-row justify-between items-center group hover:bg-white transition-all shadow-sm">
                                        <div className="text-center md:text-left">
                                            <h3 className="serif text-5xl mb-3">{studio}</h3>
                                            <p className="text-[12px] font-bold uppercase opacity-30 tracking-[0.2em]">Saturdays & Sundays • 10:00 AM - 1:00 PM</p>
                                        </div>
                                        <button onClick={() => setReserveStudio(studio)} className="bg-soldier text-warm-fog px-12 py-5 rounded-full font-bold text-[11px] tracking-widest shadow-xl uppercase">Reserve Spot</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer className="py-32 bg-soldier text-warm-fog px-10 rounded-t-[7rem]">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between gap-20">
                            <div className="max-w-md">
                                <h2 className="serif text-6xl mb-8 tracking-widest">MODERN WEAVES</h2>
                                <p className="opacity-50 text-xl leading-relaxed italic">"Keep the loops slow and the tea hot." — Marwa Fathi</p>
                            </div>
                            <div className="flex gap-20 text-[12px] uppercase tracking-[0.2em] font-bold">
                                <div className="space-y-6">
                                    <p onClick={() => setPage('shop')} className="cursor-pointer hover:text-berry-good transition">Shop All</p>
                                    <p onClick={() => setPage('courses')} className="cursor-pointer hover:text-berry-good transition">Workshops</p>
                                    <p onClick={() => setPage('about')} className="cursor-pointer hover:text-berry-good transition">About Us</p>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
